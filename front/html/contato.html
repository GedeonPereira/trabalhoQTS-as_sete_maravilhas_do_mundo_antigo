<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contato</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="../css/contato.css">
	<link rel="shortcut icon" href="../images/logo.jpg" type="image/x-icon">
</head>

<body class="contato">

	<nav class="navbar navbar-expand-lg navbar-dark home__nav">
		<div class="container">

			<a class="navbar-brand" href="home.html">
				<img class="logo" src="../images/logo.jpg" alt="logo">
			</a>

			<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="menu">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
					<li class="nav-item"><a class="nav-link" href="galeria.html">Galeria</a></li>
					<li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
					<li class="nav-item"><a class="nav-link active" href="contato.html">Contato</a></li>
				</ul>
			</div>

		</div>
	</nav>

	<section class="container mt-5 mb-5 contato__container">

		<h1 class="text-center mb-4 contato__titulo">Contato</h1>

		<form id="form" class="contato__form">

			<div class="mb-3">
				<label class="form-label">Nome</label>
				<input type="text" class="form-control contato__input" id="nome">
			</div>

			<div class="mb-3">
				<label class="form-label">Email</label>
				<input type="email" class="form-control contato__input" id="email">
			</div>

			<div class="mb-3">
				<label class="form-label">Mensagem</label>
				<textarea class="form-control contato__input" rows="4" id="mensagem"></textarea>
			</div>

			<div class="text-center">
				<button type="submit" class="btn contato__botao">Enviar</button>
			</div>

		</form>

	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="../../back/contato.js"></script>

</body>
</html>
